name: Download and Release APK

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a tag starting with 'v' (e.g., v1.0)
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release and upload assets

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download APK from URL
        run: |
          # Replace the URL below with your actual APK download link
          curl -L -o "minecraft-hub.apk" "https://example.com/path/to/your/file.apk"

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: minecraft-hub.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
