name: Manual File Release

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Version (e.g., v1.0.0 or v1.0.0-beta)'
        required: true
        default: 'v1.0.0'
        type: string
      file_url:
        description: 'Direct URL to the APK or IPA'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine File Extension and Download
        run: |
          URL="${{ github.event.inputs.file_url }}"
          
          # Check if the URL contains .ipa, otherwise default to .apk
          if [[ "$URL" == *".ipa"* ]]; then
            EXT="ipa"
          else
            EXT="apk"
          fi
          
          FILENAME="Minecraft Bedrock ${{ github.event.inputs.version_number }}.$EXT"
          
          # Save the filename to GitHub ENV so the next step can use it
          echo "FILE_NAME=$FILENAME" >> $GITHUB_ENV
          
          # Download the file with the correct extension
          curl -L -o "$FILENAME" "$URL"

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_number }}
          name: ${{ github.event.inputs.version_number }}
          # Use the environment variable we set in the previous step
          files: ${{ env.FILE_NAME }}
          
          # LOGIC: If version contains '-beta', mark as prerelease
          prerelease: ${{ contains(github.event.inputs.version_number, '-beta') }}
          
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
