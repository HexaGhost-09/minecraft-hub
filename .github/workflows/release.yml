name: Manual APK Release

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Version Number (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string
      apk_url:
        description: 'Direct URL to the APK'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download APK
        run: |
          # We use quotes around the filename because it contains spaces
          curl -L -o "Minecraft Bedrock ${{ github.event.inputs.version_number }}.apk" "${{ github.event.inputs.apk_url }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag and Title are now exactly the same
          tag_name: ${{ github.event.inputs.version_number }}
          name: ${{ github.event.inputs.version_number }}
          # Description is empty
          body: ""
          # Uses the dynamic filename with the version number
          files: "Minecraft Bedrock ${{ github.event.inputs.version_number }}.apk"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
