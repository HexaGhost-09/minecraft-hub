name: Manual APK Release

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct URL to the APK file'
        required: true
        type: string
      release_tag:
        description: 'Tag for this release (e.g., v1.0.2)'
        required: true
        default: 'v1.0.0'
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download APK from Input URL
        run: |
          # We use the input from the UI here
          curl -L -o "app-release.apk" "${{ github.event.inputs.apk_url }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Release ${{ github.event.inputs.release_tag }}
          body: "Automated release of APK downloaded from: ${{ github.event.inputs.apk_url }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
