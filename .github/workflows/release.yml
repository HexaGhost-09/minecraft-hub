name: Manual APK Release

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Version (e.g., v1.0.0 or v1.0.0-beta)'
        required: true
        default: 'v1.0.0'
        type: string
      apk_url:
        description: 'Direct URL to the APK'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download APK
        run: |
          # The filename will include the version you typed
          curl -L -o "Minecraft Bedrock ${{ github.event.inputs.version_number }}.apk" "${{ github.event.inputs.apk_url }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_number }}
          name: ${{ github.event.inputs.version_number }}
          body: ""
          files: "Minecraft Bedrock ${{ github.event.inputs.version_number }}.apk"
          
          # LOGIC: If version contains '-beta', mark as prerelease
          prerelease: ${{ contains(github.event.inputs.version_number, '-beta') }}
          
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
