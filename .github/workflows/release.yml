name: Manual File Release

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Version (e.g., v1.0.0 or v1.0.0-beta)'
        required: true
        default: 'v1.0.0'
        type: string
      file_url:
        description: 'Direct URL to the APK or IPA'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download File & Generate Fancy Release Notes
        run: |
          URL="${{ github.event.inputs.file_url }}"
          
          # Check extension and set platform name
          if [[ "$URL" == *".ipa"* ]]; then
            EXT="ipa"
            PLATFORM="iOS"
          else
            EXT="apk"
            PLATFORM="Android"
          fi
          
          FILENAME="Minecraft Bedrock ${{ github.event.inputs.version_number }}.$EXT"
          echo "FILE_NAME=$FILENAME" >> $GITHUB_ENV
          
          # 1. Download the file
          curl -L -o "$FILENAME" "$URL"
          
          # 2. Calculate Fancy Details
          FILE_SIZE=$(ls -lh "$FILENAME" | awk '{print $5}')
          SHA256=$(sha256sum "$FILENAME" | awk '{print $1}')
          UPLOAD_DATE=$(date -u +"%B %d, %Y at %H:%M UTC")
          
          # 3. Create the Markdown body for this specific file
          cat <<EOF > release_notes.md
          
          ### 📦 Uploaded File: \`$FILENAME\`
          - **Platform:** $PLATFORM
          - **File Size:** \`$FILE_SIZE\`
          - **SHA-256:** \`$SHA256\`
          - **Uploaded:** $UPLOAD_DATE
          
          EOF

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_number }}
          name: ${{ github.event.inputs.version_number }}
          files: ${{ env.FILE_NAME }}
          
          # Point the body to our generated markdown file
          body_path: release_notes.md
          # This tells GitHub to ADD these notes to the existing release, not overwrite!
          append_body: true 
          
          prerelease: ${{ contains(github.event.inputs.version_number, '-beta') }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
